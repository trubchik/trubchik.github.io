<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humavéra</title>
<meta name="description" content="The Human Era. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&family=Source+Sans+Pro:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --void: #0a0a0f;
  --ember: #E2C792;
  --ember-hot: #FFB347;
  --ember-glow: rgba(226,199,146,.25);
  --ember-dim: rgba(226,199,146,.06);
  --neon: #74E4C5;
  --neon-glow: rgba(116,228,197,.12);
  --coral: #FF6B35;
  --ash: #c8c0b4;
  --ash-soft: rgba(200,192,180,.7);
  --ash-dim: rgba(200,192,180,.45);
  --ash-ghost: rgba(200,192,180,.2);
  --ash-whisper: rgba(200,192,180,.08);
  --white: #f0ebe4;
  --white-bright: #fff;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--void);
  font-family: 'Source Sans Pro', sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ═══ CANVAS ═══ */
canvas#bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ═══ GRAIN ═══ */
.grain {
  position: fixed; inset: 0; z-index: 10; pointer-events: none; opacity: .04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 128px;
}

/* ═══ CONTENT ═══ */
.center {
  position: relative;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 40px;
  margin-top: -80px;
}

/* ═══ LOGO ═══ */
.logo-img {
  height: 80px;
  opacity: 0;
  filter: drop-shadow(0 0 30px var(--ember-glow));
  animation: logoIn 2s cubic-bezier(.16,1,.3,1) .3s forwards;
  margin-bottom: 40px;
}

@keyframes logoIn {
  from { opacity: 0; transform: translateY(12px) scale(.96); filter: drop-shadow(0 0 0px transparent); }
  to { opacity: .9; transform: translateY(0) scale(1); filter: drop-shadow(0 0 30px var(--ember-glow)); }
}

/* ═══ TAGLINE ═══ */
.tagline {
  font-family: 'Rubik', sans-serif;
  font-size: clamp(14px, 2vw, 18px);
  font-weight: 300;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--ash-dim);
  margin-top: 48px;
  opacity: 0;
  animation: fadeUp 1.5s cubic-bezier(.16,1,.3,1) 1.2s forwards;
}

/* ═══ PHRASE ═══ */
.phrase {
  font-family: 'Rubik', sans-serif;
  font-size: clamp(20px, 3.5vw, 36px);
  font-weight: 400;
  line-height: 1.5;
  color: var(--ash-soft);
  margin-top: 24px;
  max-width: 480px;
  opacity: 0;
  animation: fadeUp 1.8s cubic-bezier(.16,1,.3,1) 1.8s forwards;
}

.phrase em {
  font-style: normal;
  color: var(--ember);
  text-shadow: 0 0 40px var(--ember-glow);
}

/* ═══ DIVIDER ═══ */
.line {
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--ember), transparent);
  margin-top: 48px;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(.16,1,.3,1) 2.6s forwards;
}

/* ═══ CONTACT ═══ */
.contact {
  margin-top: 32px;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(.16,1,.3,1) 3s forwards;
}

.contact a {
  font-family: 'Rubik', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--ash-ghost);
  text-decoration: none;
  padding: 10px 24px;
  border: 1px solid rgba(200,192,180,.08);
  border-radius: 2px;
  transition: all .5s ease;
}

.contact a:hover {
  color: var(--ember);
  border-color: rgba(226,199,146,.25);
  box-shadow: 0 0 20px var(--ember-dim);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ═══ BOTTOM ═══ */
.bottom {
  position: fixed;
  bottom: 32px;
  left: 0;
  right: 0;
  text-align: center;
  z-index: 20;
  opacity: 0;
  animation: fadeUp 1s cubic-bezier(.16,1,.3,1) 3.5s forwards;
}

.bottom span {
  font-family: 'Rubik', sans-serif;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(200,192,180,.15);
}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="grain"></div>

<div class="center">
  <img class="logo-img" src="humavera-logo.svg" alt="Humavéra">
  <div class="tagline">The Human Era</div>
  <div class="phrase">Your role is obsolete.<br>Your <em>talent</em> is not</div>
  <div class="line"></div>

</div>

<div class="bottom"><span>Coming soon</span></div>

<script>
// Floating particles — sparse, organic, ember-tinted
const c = document.getElementById('bg');
const ctx = c.getContext('2d');
let particles = [];
let W, H;

function resize() {
  W = c.width = window.innerWidth;
  H = c.height = window.innerHeight;
}

function init() {
  resize();
  particles = [];
  const count = Math.floor((W * H) / 25000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.6 + Math.random() * 1.8,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      lit: Math.random() > 0.7,
      ph: Math.random() * Math.PI * 2
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  const t = Date.now() * 0.001;

  // Connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 120) {
        const a = (1 - d / 120) * 0.06;
        ctx.strokeStyle = particles[i].lit && particles[j].lit
          ? `rgba(226,199,146,${a * 3})`
          : `rgba(200,192,180,${a})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < -10) p.x = W + 10;
    if (p.x > W + 10) p.x = -10;
    if (p.y < -10) p.y = H + 10;
    if (p.y > H + 10) p.y = -10;

    const pulse = 0.5 + 0.5 * Math.sin(t * 1.5 + p.ph);

    if (p.lit) {
      ctx.fillStyle = `rgba(226,199,146,${0.25 + pulse * 0.35})`;
      ctx.shadowColor = 'rgba(226,199,146,.2)';
      ctx.shadowBlur = 6;
    } else {
      ctx.fillStyle = `rgba(200,192,180,${0.06 + pulse * 0.06})`;
      ctx.shadowBlur = 0;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    if (Math.random() < 0.0008) p.lit = !p.lit;
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
init();
draw();
</script>
</body>
</html>
